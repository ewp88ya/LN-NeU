events {}

http {

    upstream ln_neu_core {
        server core:3000;
    }


    upstream ln_neu_ai {
        server ai:8000;
    }


    server {

        listen 80;

        server_name _;


        # Core Backend API
        location /api/ {

            proxy_pass http://ln_neu_core;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        }


        # AI Engine Internal Gateway
        location /ai/ {

            proxy_pass http://ln_neu_ai;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }


        # Production Health Check
        location /health {

            proxy_pass http://ln_neu_core/health;

            proxy_http_version 1.1;

            proxy_set_header Host $host;

        }


        # Root
        location / {

            return 200 "LN-NeU Production Gateway Running\n";

            add_header Content-Type text/plain;

        }

    }

}
