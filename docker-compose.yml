version: "3.9"

services:

  ln-neu-core:
    build: ./backend
    container_name: ln-neu-core
    ports:
      - "8000:8000"
    restart: always

  santor:
    build: ./frontend
    container_name: santor-app
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - ln-neu-core

  tictac:
    build: ./ai
    container_name: tictac-agent
    restart: always
    depends_on:
      - ln-neu-core

  admin:
    build: ./admin
    container_name: admin-panel
    ports:
      - "4000:4000"
    restart: always
    depends_on:
      - ln-neu-core
