name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # FRONTEND BUILD (INI YANG BENAR)
      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # BACKEND CHECK (OPTIONAL)
      - name: Install backend deps
        working-directory: backend
        run: npm install || true

      - name: Test backend
        working-directory: backend
        run: npm test || true
