
services:

  postgres:
    image: postgres:16
    container_name: ln-neu-postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - lnneu-network



  redis:
    image: redis:7
    container_name: ln-neu-redis
    restart: always

    networks:
      - lnneu-network



  ln-neu-ai:
    build:
      context: ./ai

    container_name: ln-neu-ai
    restart: always

    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379
      OLLAMA_MODEL: ${OLLAMA_MODEL}

    expose:
      - "8000"

    depends_on:
      - redis

    networks:
      - lnneu-network



  ln-neu-ai-worker:
    build:
      context: ./ai

    container_name: ln-neu-ai-worker
    restart: always

    command:
      python -m task_queue.runner

    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379
      OLLAMA_MODEL: ${OLLAMA_MODEL}

    depends_on:
      - redis
      - ln-neu-ai

    networks:
      - lnneu-network



  ln-neu-core:
    build:
      context: ./backend

    container_name: ln-neu-core
    restart: always

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

    expose:
      - "3000"

    depends_on:
      - postgres
      - redis
      - ln-neu-ai

    networks:
      - lnneu-network



  nginx:
    image: nginx:latest

    container_name: ln-neu-nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - ln-neu-core
      - ln-neu-ai

    networks:
      - lnneu-network



volumes:

  postgres_data:



networks:

  lnneu-network:
    driver: bridge
